<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Inter&display=swap" rel="stylesheet">
    <style>
        body { background: #05070a; color: white; font-family: 'Inter'; margin: 0; text-align: center; }
        nav { background: #0d1117; padding: 1rem 5%; display: flex; justify-content: space-between; border-bottom: 1px solid #333; }
        nav a { color: white; text-decoration: none; margin-left: 20px; opacity: 0.6; }
        nav a.active { opacity: 1; color: #00f2ff; border-bottom: 2px solid #00f2ff; }
        .box { background: rgba(255,255,255,0.05); padding: 50px; border-radius: 30px; display: inline-block; margin-top: 100px; border: 1px solid #00f2ff; }
        input { background: #000; color: #00f2ff; border: 1px solid #333; padding: 15px; width: 200px; font-size: 1.2rem; }
        button { background: #7000ff; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-family: 'Orbitron'; }
    </style>
</head>
<body>
    <nav>
        <div style="font-family: 'Orbitron'; color: #00f2ff;">RIEMANN-V</div>
        <div><a href="index.html">LECTURE</a><a href="visualizer.html">SIMULATOR</a><a href="archives.html">ARCHIVES</a><a href="audit.html" class="active">VERIFY</a></div>
    </nav>
    <div class="box">
        <h1>System Logic Audit</h1>
        <p>Calculate the <b>Right Riemann Sum</b> for \(f(x) = x + 2\) on \([0, 2]\) with \(n = 2\).</p>
        <input type="number" id="userAns" placeholder="Your Answer">
        <br><br>
        <button onclick="check()">VERIFY SYSTEM</button>
        <h2 id="feedback"></h2>
    </div>
    <script>
        function check() {
            const ans = document.getElementById('userAns').value;
            // Math: dx=1. x1=1, x2=2. f(1)=3, f(2)=4. Sum = 1(3+4) = 7.
            if(ans == 7) {
                document.getElementById('feedback').innerText = "✅ LOGIC VERIFIED: Correct.";
                document.getElementById('feedback').style.color = "#00f2ff";
            } else {
                document.getElementById('feedback').innerText = "❌ ERROR: Check your math.";
                document.getElementById('feedback').style.color = "#ff4d4d";
            }
        }
    </script>
</body>
